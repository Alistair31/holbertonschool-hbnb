<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="icon" href="/static/images/icon.png" type="image/png">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    {% include 'header.html' %}
    <main role="main" id="main-content">
        <section id="place-details" class="place-details" aria-live="polite" aria-label="Place details">
            <div class="place-info">
                <!-- Place details will be populated dynamically -->
            </div>
        </section>
        <section id="reviews" aria-label="Reviews">
            <h2>Reviews</h2>
            <div id="reviews-list" aria-live="polite">
                <!-- Reviews will be populated dynamically -->
            </div>
        </section>
        <section id="add-review" aria-label="Add a review">
            <h2>Add a Review</h2>
            <form id="review-form" class="add-review" novalidate>
                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review-text" required aria-required="true"></textarea>
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required aria-required="true">
                    <option value="1">1 - Poor</option>
                    <option value="2">2 - Fair</option>
                    <option value="3">3 - Good</option>
                    <option value="4">4 - Very Good</option>
                    <option value="5">5 - Excellent</option>
                </select>
                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>
    {% include 'footer.html' %}
    <script src="/static/scripts.js"></script>
</body>
</html>
