<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Place</title>
    <link rel="icon" href="/static/images/icon.png" type="image/png">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    {% include 'header.html' %}
    <main role="main" id="main-content">
        <form id="create-place-form" class="form" novalidate>
            <h2>Create a Place</h2>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required aria-required="true">

            <label for="description">Description:</label>
            <textarea id="description" name="description" required aria-required="true"></textarea>

            <label for="price">Price per night (gold):</label>
            <input type="number" id="price" name="price" min="0" step="0.01" required aria-required="true">

            <label for="latitude">Latitude:</label>
            <input type="number" id="latitude" name="latitude" step="any" required aria-required="true">

            <label for="longitude">Longitude:</label>
            <input type="number" id="longitude" name="longitude" step="any" required aria-required="true">

            <fieldset>
                <legend>Amenities</legend>
                <div id="amenities-list" role="group" aria-label="Select amenities">
                    <!-- Populated dynamically -->
                </div>
            </fieldset>

            <label for="images">Images (first = primary):</label>
            <input type="file" id="images" name="images" accept="image/*" multiple aria-label="Upload place images, first image will be the primary">

            <button type="submit">Create Place</button>
        </form>
    </main>
    {% include 'footer.html' %}
    <script src="/static/scripts.js"></script>
</body>
</html>
